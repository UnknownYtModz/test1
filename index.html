<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Generated | Unknown Modz</title>
    <style>
        :root { --bg: #000000; --card: #121212; --text: #ffffff; --accent: #00ff88; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            margin-top: 50px;
        }

        /* --- LOGO FIX (Upar aur Bada) --- */
        .key-icon { 
            background: #1a1a1a; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: -45px auto 15px; /* Logo ko upar khichne ke liye */
            border: 1px solid #333; 
            overflow: hidden; 
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.1);
            position: relative;
            z-index: 10;
        }

        .key-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (min-width: 768px) {
            .container { max-width: 450px; }
            .key-icon { width: 110px; height: 110px; margin: -55px auto 20px; }
        }

        h1 { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* Success Card */
        .card { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 28px; 
            padding: 40px 30px 30px; 
            text-align: center; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); 
            position: relative;
        }

        h2 { font-size: 22px; margin-bottom: 12px; color: var(--accent); font-weight: 700; }
        .card-p { color: #999; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }

        /* Key Display Box */
        .key-box { 
            background: #000; 
            padding: 22px; 
            border-radius: 18px; 
            border: 1px dashed var(--accent); 
            margin-bottom: 25px; 
            position: relative; 
            overflow: hidden; 
        }
        
        #finalKey { 
            color: var(--accent); 
            font-family: 'Courier New', monospace; 
            font-size: 19px; 
            font-weight: bold; 
            letter-spacing: 1px; 
        }
        
        /* Copy Button */
        .btn { 
            width: 100%; 
            padding: 18px; 
            background: #ffffff; 
            color: #000; 
            border: none; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn:hover { 
            transform: scale(1.03); 
            background: var(--accent); 
            box-shadow: 0 10px 20px rgba(0,255,136,0.2);
        }

        .footer { margin-top: 30px; color: #333; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="key-icon">
        <img src="./assets/logo.png" alt="UKM">
    </div>

    <h1>Access Unlocked</h1>
    <p class="subtitle">Your 24-hour license key is ready to use.</p>

    <div class="card">
        <h2>Generation Success!</h2>
        <p class="card-p">Copy the key below and paste it into the login dialog to continue.</p>

        <div class="key-box">
            <span id="finalKey">GENERATING...</span>
        </div>

        <button class="btn" id="copyBtn" onclick="copyKey()">
            COPY TO CLIPBOARD
        </button>
    </div>

    <div class="footer">UNKNOWN MODZ SECURITY SYSTEM</div>
</div>

<script>
    window.onload = function() {
        // --- AUTO KEY LOGIC ---
        const day = Math.floor(Date.now() / 86400000);
        let seed = 2026 + day; 
        
        function rnd() { 
            var x = Math.sin(seed++) * 10000; 
            return Math.abs(x - Math.floor(x)); 
        }
        
        let segments = [];
        for(let i=0; i<4; i++) {
            let s = "";
            for(let j=0; j<4; j++) s += Math.floor(rnd() * 10);
            segments.push(s);
        }

        const generatedKey = "UKM-" + segments.join("-");
        document.getElementById('finalKey').innerText = generatedKey;
    };

    function copyKey() {
        const keyText = document.getElementById('finalKey').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED SUCCESSFULLY! ✅";
            btn.style.background = "#00ff88";
            setTimeout(() => { 
                btn.innerText = "COPY TO CLIPBOARD"; 
                btn.style.background = "#ffffff";
            }, 2000);
        });
    }
</script>

</body>
</html>
